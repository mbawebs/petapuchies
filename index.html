<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Your Pet</title>

<style>
:root{
  --ink:#292b45;
  --muted:#777995;
  --white:#fff;
  --glass:rgba(255,255,255,.78);
  --soft:#f5f7ff;
  --pink:#ff75b7;
  --blue:#64caff;
  --green:#7ce37f;
  --yellow:#ffd85f;
  --purple:#9b86ff;
  --orange:#ffae57;
  --red:#ff6b6b;
  --shadow:0 18px 40px rgba(35,38,70,.18);
  --radius:28px;
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

html,body{
  margin:0;
  min-height:100%;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  color:var(--ink);
  background:
    radial-gradient(circle at 15% 10%,rgba(255,255,255,.6) 0 9%,transparent 10%),
    radial-gradient(circle at 85% 15%,rgba(255,255,255,.45) 0 8%,transparent 9%),
    linear-gradient(135deg,#80e7ff,#ffd4ef);
  overflow-x:hidden;
}

body.no-scroll{overflow:hidden}

button,input{
  font-family:inherit;
}

.app{
  width:min(1240px,100%);
  margin:0 auto;
  padding:16px;
}

header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  margin-bottom:14px;
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
  font-size:clamp(30px,5vw,50px);
  font-weight:950;
  letter-spacing:-1.5px;
  color:white;
  text-shadow:0 5px 0 rgba(35,38,70,.12);
}

.logo-badge{
  width:50px;
  height:50px;
  display:grid;
  place-items:center;
  border-radius:18px;
  background:linear-gradient(145deg,var(--yellow),var(--pink));
  box-shadow:var(--shadow);
  font-size:26px;
}

.top-info{
  display:flex;
  gap:8px;
  align-items:center;
  flex-wrap:wrap;
  justify-content:flex-end;
}

.pill{
  background:var(--glass);
  border:3px solid rgba(255,255,255,.55);
  box-shadow:0 10px 24px rgba(35,38,70,.12);
  border-radius:999px;
  padding:9px 14px;
  font-weight:950;
  white-space:nowrap;
}

.layout{
  display:grid;
  grid-template-columns:1.35fr .85fr;
  gap:18px;
}

.room{
  min-height:670px;
  border-radius:var(--radius);
  border:6px solid rgba(255,255,255,.6);
  box-shadow:var(--shadow);
  overflow:hidden;
  position:relative;
  background:
    linear-gradient(to bottom,rgba(255,255,255,.45) 0 57%,transparent 58%),
    linear-gradient(to bottom,#dffaff 0 57%,#ffe8ba 58% 100%);
}

.room:before{
  content:"";
  position:absolute;
  inset:0;
  background-image:radial-gradient(circle,rgba(255,255,255,.85) 0 5px,transparent 6px);
  background-size:54px 54px;
  opacity:.32;
}

.window{
  position:absolute;
  top:42px;
  left:42px;
  width:150px;
  height:120px;
  border:8px solid white;
  border-radius:26px;
  background:linear-gradient(#95e9ff,#fff0b0);
  z-index:1;
  box-shadow:0 10px 22px rgba(35,38,70,.13);
}
.window:before,.window:after{
  content:"";
  position:absolute;
  background:white;
}
.window:before{width:8px;height:100%;left:50%;top:0}
.window:after{height:8px;width:100%;top:50%;left:0}

.shelf{
  position:absolute;
  top:70px;
  right:48px;
  width:180px;
  height:18px;
  border-radius:999px;
  background:#ffb46b;
  z-index:1;
  box-shadow:0 12px 18px rgba(35,38,70,.13);
}
.shelf:before,.shelf:after{
  content:"";
  position:absolute;
  bottom:18px;
  width:46px;
  height:58px;
  border-radius:16px 16px 8px 8px;
  background:white;
}
.shelf:before{left:22px}
.shelf:after{right:25px;background:var(--purple)}

.rug{
  position:absolute;
  left:50%;
  bottom:48px;
  transform:translateX(-50%);
  width:62%;
  height:96px;
  border-radius:50%;
  background:radial-gradient(ellipse,var(--pink) 0 62%,#e45d9f 64%);
  opacity:.65;
  z-index:1;
}

.pet-stage{
  position:absolute;
  inset:115px 35px 70px;
  display:grid;
  place-items:center;
  z-index:3;
}

.pet-wrap{
  position:relative;
  display:grid;
  place-items:center;
  cursor:pointer;
  user-select:none;
  animation:idle 2.4s ease-in-out infinite;
}

@keyframes idle{
  0%,100%{transform:translateY(0) scale(1)}
  50%{transform:translateY(-10px) scale(1.015)}
}

.pet-img{
  max-width:min(420px,78vw);
  max-height:430px;
  object-fit:contain;
  filter:drop-shadow(0 28px 20px rgba(35,38,70,.22));
}

.pet-css{
  width:min(390px,75vw);
  height:min(390px,75vw);
  max-width:390px;
  max-height:390px;
  border-radius:48% 52% 43% 57% / 55% 50% 50% 45%;
  background:
    radial-gradient(circle at 32% 38%,white 0 8%,transparent 9%),
    radial-gradient(circle at 68% 38%,white 0 8%,transparent 9%),
    linear-gradient(145deg,#ffbd59,#ff75b7);
  box-shadow:inset -28px -30px 0 rgba(0,0,0,.06),0 30px 25px rgba(35,38,70,.22);
  position:relative;
}

.pet-css:before,.pet-css:after{
  content:"";
  position:absolute;
  top:35%;
  width:26px;
  height:32px;
  background:var(--ink);
  border-radius:50%;
  z-index:2;
}
.pet-css:before{left:31%}
.pet-css:after{right:31%}

.mouth{
  position:absolute;
  width:70px;
  height:35px;
  border-bottom:9px solid var(--ink);
  border-radius:0 0 70px 70px;
  bottom:29%;
  left:50%;
  transform:translateX(-50%);
}

.accessory{
  position:absolute;
  top:5%;
  left:50%;
  transform:translateX(-50%);
  font-size:clamp(40px,8vw,75px);
  z-index:5;
  pointer-events:none;
  filter:drop-shadow(0 7px 5px rgba(0,0,0,.16));
}

.pet-name{
  position:absolute;
  bottom:-48px;
  background:white;
  border-radius:999px;
  padding:9px 20px;
  font-weight:950;
  box-shadow:0 10px 22px rgba(35,38,70,.14);
}

.bubble{
  position:absolute;
  top:115px;
  left:50%;
  transform:translateX(-50%);
  background:white;
  border-radius:999px;
  padding:10px 18px;
  box-shadow:var(--shadow);
  font-weight:950;
  opacity:0;
  pointer-events:none;
  z-index:8;
  transition:.25s;
}
.bubble.show{
  opacity:1;
  top:92px;
}

.panel{
  min-height:670px;
  background:var(--glass);
  border:6px solid rgba(255,255,255,.55);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:16px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.card{
  background:rgba(255,255,255,.72);
  border-radius:24px;
  padding:14px;
  box-shadow:0 8px 20px rgba(35,38,70,.08);
}

.card h2{
  margin:0 0 10px;
  font-size:19px;
  letter-spacing:-.2px;
}

.stat{margin:10px 0}
.stat-top{
  display:flex;
  justify-content:space-between;
  font-size:14px;
  font-weight:900;
  margin-bottom:5px;
}
.bar{
  height:17px;
  background:#e5e7f3;
  border-radius:999px;
  overflow:hidden;
  box-shadow:inset 0 2px 5px rgba(0,0,0,.12);
}
.fill{
  height:100%;
  width:50%;
  border-radius:999px;
  transition:width .35s ease;
}
.hunger{background:linear-gradient(90deg,#ff9d45,var(--yellow))}
.happy{background:linear-gradient(90deg,var(--pink),var(--purple))}
.clean{background:linear-gradient(90deg,var(--blue),#98efff)}
.energy{background:linear-gradient(90deg,var(--green),#bdff7a)}
.xp{background:linear-gradient(90deg,#a78bfa,#67e8f9)}

.btn-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:9px;
}

button{
  border:0;
  border-radius:18px;
  padding:12px 9px;
  font-weight:950;
  color:var(--ink);
  background:white;
  box-shadow:0 8px 0 rgba(35,38,70,.12),0 12px 18px rgba(35,38,70,.08);
  cursor:pointer;
  transition:.12s;
  font-size:14px;
}
button:active{
  transform:translateY(5px);
  box-shadow:0 3px 0 rgba(35,38,70,.12);
}

.btn-food{background:var(--yellow)}
.btn-bath{background:var(--blue)}
.btn-sleep{background:var(--purple);color:white}
.btn-love{background:var(--green)}
.btn-game{background:linear-gradient(145deg,#fff,var(--yellow))}
.btn-reset{background:#ffe1e1}
.ghost{
  background:rgba(255,255,255,.72);
  box-shadow:none;
  border:2px solid rgba(35,38,70,.08);
  padding:10px;
  font-size:13px;
}

.game-list{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:8px;
}

.game-btn{
  min-height:62px;
  text-align:left;
  display:flex;
  flex-direction:column;
  justify-content:center;
  gap:2px;
  padding:10px 12px;
}
.game-btn small{
  color:rgba(41,43,69,.66);
  font-weight:850;
}

.shop-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
}
.shop-item{
  background:var(--soft);
  border-radius:18px;
  text-align:center;
  padding:8px 4px;
  font-weight:900;
  border:3px solid transparent;
  cursor:pointer;
}
.shop-item.owned{
  background:#edffef;
  border-color:var(--green);
}
.shop-item small{
  font-size:10px;
  color:var(--muted);
  font-weight:850;
}
.shop-emoji{
  display:block;
  font-size:26px;
}

.toast{
  position:fixed;
  left:50%;
  bottom:22px;
  transform:translateX(-50%) translateY(30px);
  background:var(--ink);
  color:white;
  border-radius:999px;
  padding:12px 18px;
  font-weight:900;
  opacity:0;
  pointer-events:none;
  transition:.25s;
  z-index:100;
}
.toast.show{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}

/* MODALS */
.modal{
  position:fixed;
  inset:0;
  background:rgba(35,38,70,.58);
  z-index:50;
  display:none;
  place-items:center;
  padding:14px;
}
.modal.show{display:grid}
.modal-box{
  width:min(460px,100%);
  background:linear-gradient(180deg,#fff,#f7f8ff);
  border:7px solid rgba(255,255,255,.9);
  border-radius:30px;
  box-shadow:var(--shadow);
  padding:20px;
  text-align:center;
}
.modal-box h2{margin:0 0 10px;font-size:28px}
.modal-box p{margin:0 0 15px;color:var(--muted);font-weight:750}
.modal-box input{
  width:100%;
  border:3px solid #e4e7f5;
  border-radius:18px;
  padding:14px;
  font-size:18px;
  font-weight:850;
  outline:none;
  text-align:center;
  margin-bottom:12px;
}
.modal-actions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

/* GAME MODAL */
.game-modal{
  position:fixed;
  inset:0;
  z-index:60;
  background:rgba(35,38,70,.65);
  display:none;
  place-items:center;
  padding:12px;
}
.game-modal.show{
  display:grid;
}
.game-box{
  width:min(590px,100%);
  height:min(720px,90vh);
  border-radius:32px;
  border:8px solid white;
  box-shadow:var(--shadow);
  background:linear-gradient(#e5fbff,#fff2c5);
  position:relative;
  overflow:hidden;
  touch-action:none;
  user-select:none;
}
.game-head{
  position:absolute;
  top:12px;
  left:12px;
  right:12px;
  z-index:8;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
  background:rgba(255,255,255,.82);
  border-radius:999px;
  padding:8px 10px 8px 15px;
  font-weight:950;
  box-shadow:0 8px 18px rgba(35,38,70,.1);
}
.game-title{
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.game-score{
  white-space:nowrap;
}
.game-stage{
  position:absolute;
  inset:0;
  overflow:hidden;
}
.game-pet{
  position:absolute;
  left:50%;
  bottom:24px;
  transform:translateX(-50%);
  width:145px;
  height:145px;
  display:grid;
  place-items:center;
  z-index:3;
  pointer-events:none;
}
.game-pet img{
  max-width:100%;
  max-height:100%;
  object-fit:contain;
  filter:drop-shadow(0 14px 10px rgba(35,38,70,.23));
}
.game-pet .pet-css{
  width:128px;
  height:128px;
}
.fall-item,.pop-item,.bad-item{
  position:absolute;
  font-size:38px;
  cursor:pointer;
  z-index:5;
  user-select:none;
}
@keyframes fall{
  from{transform:translateY(-70px) rotate(0deg)}
  to{transform:translateY(780px) rotate(360deg)}
}
@keyframes popIn{
  0%{transform:scale(.3);opacity:0}
  100%{transform:scale(1);opacity:1}
}
.drag-pet{
  position:absolute;
  bottom:24px;
  width:120px;
  height:120px;
  display:grid;
  place-items:center;
  z-index:5;
  pointer-events:none;
}
.drag-pet img{
  max-width:100%;
  max-height:100%;
  object-fit:contain;
  filter:drop-shadow(0 14px 10px rgba(35,38,70,.23));
}
.drag-pet .pet-css{
  width:110px;
  height:110px;
}
.scrub-dirt{
  position:absolute;
  width:42px;
  height:42px;
  background:rgba(112,73,36,.75);
  border-radius:50%;
  z-index:6;
  box-shadow:inset -5px -6px 0 rgba(0,0,0,.12);
}
.bubble-dot{
  position:absolute;
  font-size:28px;
  z-index:7;
  pointer-events:none;
  animation:bubbleFloat .8s ease forwards;
}
@keyframes bubbleFloat{
  from{transform:translateY(0) scale(.6);opacity:1}
  to{transform:translateY(-45px) scale(1.2);opacity:0}
}
.sleep-meter{
  position:absolute;
  left:8%;
  right:8%;
  bottom:170px;
  height:32px;
  border-radius:999px;
  background:#e5e7f3;
  overflow:hidden;
  z-index:5;
  box-shadow:inset 0 2px 5px rgba(0,0,0,.12);
}
.sleep-fill{
  width:50%;
  height:100%;
  background:linear-gradient(90deg,var(--purple),#67e8f9);
  border-radius:999px;
}
.sleep-z{
  position:absolute;
  font-size:38px;
  font-weight:950;
  color:var(--purple);
  z-index:6;
  animation:zzz 1.1s ease forwards;
}
@keyframes zzz{
  from{transform:translateY(0) scale(.7);opacity:1}
  to{transform:translateY(-80px) scale(1.2);opacity:0}
}
.wheel-wrap{
  position:absolute;
  inset:85px 20px 20px;
  display:grid;
  place-items:center;
  z-index:4;
}
.wheel{
  width:min(360px,82vw);
  height:min(360px,82vw);
  border-radius:50%;
  border:10px solid white;
  background:conic-gradient(
    #ffd85f 0 60deg,
    #ff75b7 60deg 120deg,
    #64caff 120deg 180deg,
    #7ce37f 180deg 240deg,
    #9b86ff 240deg 300deg,
    #ffae57 300deg 360deg
  );
  box-shadow:0 18px 35px rgba(35,38,70,.2);
  display:grid;
  place-items:center;
  font-size:54px;
  transition:transform 3s cubic-bezier(.15,.78,.18,1);
}
.pointer{
  position:absolute;
  top:8%;
  font-size:46px;
  z-index:6;
  filter:drop-shadow(0 4px 3px rgba(0,0,0,.18));
}
.wheel-btn{
  position:absolute;
  bottom:28px;
  left:50%;
  transform:translateX(-50%);
  z-index:8;
  width:70%;
  max-width:320px;
}

@media(max-width:860px){
  .app{padding:11px}
  .layout{grid-template-columns:1fr}
  .room{min-height:430px}
  .window{
    top:24px;
    left:24px;
    width:105px;
    height:85px;
    border-width:6px;
  }
  .shelf{display:none}
  .pet-stage{inset:72px 18px 48px}
  .panel{min-height:auto;padding:11px;gap:10px}
  .card{padding:11px;border-radius:21px}
  .card h2{font-size:17px;margin-bottom:8px}
  .btn-grid{grid-template-columns:repeat(4,1fr);gap:7px}
  .btn-grid button{font-size:12px;padding:10px 4px;border-radius:15px}
  .game-list{grid-template-columns:repeat(3,1fr);gap:7px}
  .game-btn{font-size:12px;min-height:58px;padding:8px}
  .game-btn small{font-size:10px}
  .shop-grid{grid-template-columns:repeat(4,1fr)}
  .shop-item{font-size:11px}
  .shop-emoji{font-size:22px}
  .bar{height:14px}
  .stat{margin:7px 0}
  .bubble{top:80px}
  .bubble.show{top:58px}
}
@media(max-width:430px){
  .logo{font-size:30px}
  .logo-badge{width:42px;height:42px}
  .pill{font-size:13px;padding:8px 10px}
  .room{min-height:385px}
  .pet-css{width:250px;height:250px}
  .pet-img{max-height:285px}
  .pet-name{bottom:-37px;font-size:13px}
  .game-box{height:88vh;border-width:6px}
}
</style>
</head>

<body>
<div class="app">
  <header>
    <div class="logo">
      <div class="logo-badge">🐾</div>
      Your Pet
    </div>
    <div class="top-info">
      <div class="pill">⭐ Lv <span id="level">1</span></div>
      <div class="pill">🪙 <span id="coins">0</span></div>
    </div>
  </header>

  <main class="layout">
    <section class="room">
      <div class="window"></div>
      <div class="shelf"></div>
      <div class="rug"></div>
      <div class="bubble" id="bubble">Hi!</div>

      <div class="pet-stage">
        <div class="pet-wrap" id="petWrap">
          <div id="accessory" class="accessory"></div>
          <div id="pet"></div>
          <div class="pet-name" id="petName">Buddy</div>
        </div>
      </div>
    </section>

    <aside class="panel">
      <div class="card">
        <h2>Pet Stats</h2>

        <div class="stat">
          <div class="stat-top"><span>Hunger</span><span id="hungerText">80%</span></div>
          <div class="bar"><div class="fill hunger" id="hungerBar"></div></div>
        </div>

        <div class="stat">
          <div class="stat-top"><span>Happy</span><span id="happyText">80%</span></div>
          <div class="bar"><div class="fill happy" id="happyBar"></div></div>
        </div>

        <div class="stat">
          <div class="stat-top"><span>Clean</span><span id="cleanText">80%</span></div>
          <div class="bar"><div class="fill clean" id="cleanBar"></div></div>
        </div>

        <div class="stat">
          <div class="stat-top"><span>Energy</span><span id="energyText">80%</span></div>
          <div class="bar"><div class="fill energy" id="energyBar"></div></div>
        </div>

        <div class="stat">
          <div class="stat-top"><span>XP</span><span id="xpText">0/100</span></div>
          <div class="bar"><div class="fill xp" id="xpBar"></div></div>
        </div>
      </div>

      <div class="card">
        <h2>Care</h2>
        <div class="btn-grid">
          <button class="btn-food" onclick="doAction('food')">🍔 Food</button>
          <button class="btn-bath" onclick="doAction('bath')">🛁 Bath</button>
          <button class="btn-sleep" onclick="doAction('sleep')">🌙 Sleep</button>
          <button class="btn-love" onclick="doAction('love')">💖 Love</button>
        </div>
      </div>

      <div class="card">
        <h2>Micro Games</h2>
        <div class="game-list">
          <button class="game-btn btn-game" onclick="openGame('catch')">🍪 Catch<small>Tap treats</small></button>
          <button class="game-btn btn-game" onclick="openGame('snack')">🧺 Snack<small>Move pet</small></button>
          <button class="game-btn btn-game" onclick="openGame('bubble')">🫧 Bubble<small>Pop fast</small></button>
          <button class="game-btn btn-game" onclick="openGame('bath')">🧼 Scrub<small>Clean up</small></button>
          <button class="game-btn btn-game" onclick="openGame('sleep')">💤 Sleep<small>Keep meter</small></button>
          <button class="game-btn btn-game" onclick="openGame('wheel')">🎡 Wheel<small>Bonus spin</small></button>
        </div>
      </div>

      <div class="card">
        <h2>Shop</h2>
        <div class="shop-grid" id="shopGrid"></div>
      </div>

      <div class="card">
        <h2>Options</h2>
        <div class="btn-grid">
          <button class="ghost" onclick="openRename()">Rename</button>
          <button class="ghost btn-reset" onclick="resetGame()">Reset</button>
        </div>
      </div>
    </aside>
  </main>
</div>

<div class="modal" id="renameModal">
  <div class="modal-box">
    <h2>Rename Pet</h2>
    <p>Give your little buddy a name.</p>
    <input id="renameInput" maxlength="18" placeholder="Buddy" />
    <div class="modal-actions">
      <button class="ghost" onclick="closeRename()">Cancel</button>
      <button class="btn-love" onclick="saveRename()">Save</button>
    </div>
  </div>
</div>

<div class="game-modal" id="gameModal">
  <div class="game-box" id="gameBox">
    <div class="game-head">
      <div class="game-title" id="gameTitle">Game</div>
      <div class="game-score">Score: <span id="gameScore">0</span></div>
      <button class="ghost" onclick="closeGame()">Close</button>
    </div>
    <div class="game-stage" id="gameStage"></div>
  </div>
</div>

<div class="toast" id="toast">Saved!</div>

<script>
/* ============================================================
   CAMBIA AQUÍ TU MASCOTA PNG
   Ejemplo:
   const PET_IMAGE = "pet.png";
============================================================ */
const PET_IMAGE = "";

const SAVE_KEY = "yourPetMegaSave_v1";

const defaultState = {
  name:"Buddy",
  coins:50,
  level:1,
  xp:0,
  hunger:78,
  happy:76,
  clean:82,
  energy:72,
  accessory:"",
  owned:[]
};

let state = loadState();

const shopItems = [
  {id:"cap",name:"Cap",emoji:"🧢",price:20,rare:"Common"},
  {id:"bow",name:"Bow",emoji:"🎀",price:25,rare:"Common"},
  {id:"shades",name:"Shades",emoji:"😎",price:35,rare:"Rare"},
  {id:"crown",name:"Crown",emoji:"👑",price:50,rare:"Epic"},
  {id:"halo",name:"Halo",emoji:"😇",price:60,rare:"Epic"},
  {id:"rocket",name:"Boost",emoji:"🚀",price:85,rare:"Legendary"},
  {id:"star",name:"Star",emoji:"⭐",price:70,rare:"Epic"},
  {id:"fire",name:"Fire",emoji:"🔥",price:90,rare:"Legendary"}
];

const $ = id => document.getElementById(id);

const pet = $("pet");
const petName = $("petName");
const accessory = $("accessory");
const bubble = $("bubble");
const toast = $("toast");
const gameModal = $("gameModal");
const gameStage = $("gameStage");
const gameScoreEl = $("gameScore");
const gameTitle = $("gameTitle");
const gameBox = $("gameBox");

let activeGame = null;
let gameScore = 0;
let gameTimers = [];
let gameLoop = null;
let gameData = {};

function loadState(){
  try{
    return JSON.parse(localStorage.getItem(SAVE_KEY)) || structuredClone(defaultState);
  }catch(e){
    return structuredClone(defaultState);
  }
}

function save(){
  localStorage.setItem(SAVE_KEY, JSON.stringify(state));
}

function clamp(n,min=0,max=100){
  return Math.max(min, Math.min(max, n));
}

function initPet(){
  pet.innerHTML = renderPetHTML("main");
}

function renderPetHTML(mode="main"){
  if(PET_IMAGE.trim()){
    return `<img src="${PET_IMAGE}" class="${mode === "main" ? "pet-img" : ""}" alt="Your Pet">`;
  }
  return `<div class="pet-css"><div class="mouth"></div></div>`;
}

function updateUI(){
  petName.textContent = state.name;
  $("coins").textContent = state.coins;
  $("level").textContent = state.level;

  ["hunger","happy","clean","energy"].forEach(stat=>{
    const value = clamp(state[stat]);
    $(stat+"Bar").style.width = value + "%";
    $(stat+"Text").textContent = Math.round(value) + "%";
  });

  $("xpText").textContent = state.xp + "/100";
  $("xpBar").style.width = clamp(state.xp) + "%";

  const item = shopItems.find(i=>i.id === state.accessory);
  accessory.textContent = item ? item.emoji : "";

  renderShop();
  save();
}

function addXP(amount){
  state.xp += amount;
  while(state.xp >= 100){
    state.xp -= 100;
    state.level += 1;
    state.coins += 25;
    showToast("Level up! +25 coins");
  }
}

function say(text){
  bubble.textContent = text;
  bubble.classList.add("show");
  clearTimeout(window.bubbleTimer);
  window.bubbleTimer = setTimeout(()=>bubble.classList.remove("show"),1300);
}

function showToast(text){
  toast.textContent = text;
  toast.classList.add("show");
  clearTimeout(window.toastTimer);
  window.toastTimer = setTimeout(()=>toast.classList.remove("show"),1600);
}

function doAction(type){
  if(type === "food"){
    state.hunger += 20;
    state.energy += 3;
    say("Yummy!");
  }
  if(type === "bath"){
    state.clean += 22;
    state.happy += 4;
    say("So fresh!");
  }
  if(type === "sleep"){
    state.energy += 28;
    state.hunger -= 7;
    say("Zzz...");
  }
  if(type === "love"){
    state.happy += 18;
    state.energy -= 2;
    say("Hehe!");
  }

  state.hunger = clamp(state.hunger);
  state.happy = clamp(state.happy);
  state.clean = clamp(state.clean);
  state.energy = clamp(state.energy);
  addXP(3);
  updateUI();
}

$("petWrap").addEventListener("click",()=>{
  state.happy = clamp(state.happy + 2);
  addXP(1);
  say("Hi!");
  updateUI();
});

function decayStats(){
  state.hunger = clamp(state.hunger - 1);
  state.happy = clamp(state.happy - .7);
  state.clean = clamp(state.clean - .6);
  state.energy = clamp(state.energy - .5);
  updateUI();
}
setInterval(decayStats, 20000);

function renderShop(){
  const grid = $("shopGrid");
  grid.innerHTML = "";

  shopItems.forEach(item=>{
    const owned = state.owned.includes(item.id);
    const equipped = state.accessory === item.id;

    const div = document.createElement("div");
    div.className = "shop-item" + (owned ? " owned" : "");
    div.innerHTML = `
      <span class="shop-emoji">${item.emoji}</span>
      ${item.name}<br>
      <small>${owned ? (equipped ? "Equipped" : "Owned") : item.price + " coins"}</small>
    `;
    div.onclick = ()=>buyOrEquip(item);
    grid.appendChild(div);
  });
}

function buyOrEquip(item){
  const owned = state.owned.includes(item.id);

  if(owned){
    state.accessory = state.accessory === item.id ? "" : item.id;
    say(state.accessory ? "Nice fit!" : "No accessory!");
    updateUI();
    return;
  }

  if(state.coins < item.price){
    showToast("Need more coins!");
    return;
  }

  state.coins -= item.price;
  state.owned.push(item.id);
  state.accessory = item.id;
  showToast(`${item.rare} item unlocked!`);
  updateUI();
}

function openRename(){
  $("renameInput").value = state.name;
  $("renameModal").classList.add("show");
  setTimeout(()=>$("renameInput").focus(),100);
}

function closeRename(){
  $("renameModal").classList.remove("show");
}

function saveRename(){
  const value = $("renameInput").value.trim().slice(0,18);
  state.name = value || "Buddy";
  closeRename();
  say("That's my name!");
  updateUI();
}

function resetGame(){
  if(!confirm("Reset Your Pet?")) return;
  state = structuredClone(defaultState);
  save();
  updateUI();
  showToast("Game reset!");
}

function clearGame(){
  gameTimers.forEach(t=>clearTimeout(t));
  gameTimers = [];
  clearInterval(gameLoop);
  gameLoop = null;
  gameStage.innerHTML = "";
  gameScore = 0;
  gameData = {};
  gameScoreEl.textContent = "0";
}

function openGame(type){
  clearGame();
  activeGame = type;
  gameModal.classList.add("show");
  document.body.classList.add("no-scroll");

  if(type === "catch") startCatchGame();
  if(type === "snack") startSnackGame();
  if(type === "bubble") startBubbleGame();
  if(type === "bath") startBathGame();
  if(type === "sleep") startSleepGame();
  if(type === "wheel") startWheelGame();
}

function closeGame(){
  if(activeGame && activeGame !== "wheel") finishGame();
  else {
    clearGame();
    gameModal.classList.remove("show");
    document.body.classList.remove("no-scroll");
    activeGame = null;
  }
}

function finishGame(){
  const coins = Math.max(0, gameScore * 2);
  state.coins += coins;
  state.happy = clamp(state.happy + Math.min(18, gameScore));
  state.energy = clamp(state.energy - 6);
  addXP(Math.min(25, 5 + gameScore));

  showToast(`+${coins} coins`);
  say("Fun!");
  updateUI();

  clearGame();
  gameModal.classList.remove("show");
  document.body.classList.remove("no-scroll");
  activeGame = null;
}

function setScore(n){
  gameScore = Math.max(0,n);
  gameScoreEl.textContent = gameScore;
}

function addScore(n=1){
  setScore(gameScore + n);
}

function addGamePet(className="game-pet"){
  const d = document.createElement("div");
  d.className = className;
  d.innerHTML = renderPetHTML("game");
  gameStage.appendChild(d);
  return d;
}

function timeout(fn,ms){
  const t = setTimeout(fn,ms);
  gameTimers.push(t);
  return t;
}

/* 1. CATCH TREATS */
function startCatchGame(){
  gameTitle.textContent = "🍪 Catch Treats";
  addGamePet();

  gameLoop = setInterval(()=>{
    const item = document.createElement("div");
    item.className = "fall-item";
    item.textContent = ["🍪","🍓","🦴","🍩","🥨"][Math.floor(Math.random()*5)];
    item.style.left = (Math.random()*82 + 6) + "%";
    item.style.top = "35px";
    item.style.animation = `fall ${2.3 + Math.random()*1.2}s linear forwards`;
    item.onclick = e=>{
      e.stopPropagation();
      addScore(1);
      item.remove();
    };
    gameStage.appendChild(item);
    timeout(()=>item.remove(),4200);
  },620);

  timeout(finishGame,17000);
}

/* 2. SNACK CATCHER */
function startSnackGame(){
  gameTitle.textContent = "🧺 Snack Catcher";

  const petEl = addGamePet("drag-pet");
  gameData.petX = gameBox.clientWidth / 2;
  petEl.style.left = (gameData.petX - 60) + "px";

  const move = e=>{
    const rect = gameBox.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    gameData.petX = clamp(clientX - rect.left, 55, rect.width - 55);
    petEl.style.left = (gameData.petX - 60) + "px";
  };

  gameBox.addEventListener("pointermove", move);
  gameBox.addEventListener("pointerdown", move);
  gameData.cleanup = ()=>{
    gameBox.removeEventListener("pointermove", move);
    gameBox.removeEventListener("pointerdown", move);
  };

  gameLoop = setInterval(()=>{
    const good = Math.random() > .22;
    const item = document.createElement("div");
    item.className = good ? "fall-item" : "bad-item";
    item.textContent = good ? ["🍪","🍓","🦴","🍩"][Math.floor(Math.random()*4)] : ["💣","🧦","🪨"][Math.floor(Math.random()*3)];
    let x = Math.random() * (gameBox.clientWidth - 60) + 20;
    let y = 50;
    item.style.left = x + "px";
    item.style.top = y + "px";
    gameStage.appendChild(item);

    const faller = setInterval(()=>{
      y += 5.8;
      item.style.top = y + "px";

      const px = gameData.petX;
      const py = gameBox.clientHeight - 90;
      if(Math.abs((x+20) - px) < 60 && Math.abs(y - py) < 65){
        if(good) addScore(1);
        else setScore(gameScore - 2);
        item.remove();
        clearInterval(faller);
      }

      if(y > gameBox.clientHeight + 50){
        item.remove();
        clearInterval(faller);
      }
    },16);

    gameTimers.push(faller);
  },650);

  timeout(()=>{
    if(gameData.cleanup) gameData.cleanup();
    finishGame();
  },18000);
}

/* 3. BUBBLE POP */
function startBubbleGame(){
  gameTitle.textContent = "🫧 Bubble Pop";
  addGamePet();

  gameLoop = setInterval(()=>{
    const item = document.createElement("div");
    item.className = "pop-item";
    item.textContent = ["🫧","⭐","💖","✨"][Math.floor(Math.random()*4)];
    item.style.left = (Math.random()*78 + 8) + "%";
    item.style.top = (Math.random()*60 + 18) + "%";
    item.style.animation = "popIn .18s ease";
    item.onclick = e=>{
      e.stopPropagation();
      addScore(1);
      item.textContent = "💥";
      timeout(()=>item.remove(),80);
    };
    gameStage.appendChild(item);
    timeout(()=>item.remove(),1250);
  },380);

  timeout(finishGame,16000);
}

/* 4. BATH SCRUB */
function startBathGame(){
  gameTitle.textContent = "🧼 Bath Scrub";
  const petEl = addGamePet();
  petEl.style.bottom = "95px";

  for(let i=0;i<12;i++){
    const dirt = document.createElement("div");
    dirt.className = "scrub-dirt";
    dirt.style.left = (Math.random()*55 + 22) + "%";
    dirt.style.top = (Math.random()*42 + 25) + "%";
    gameStage.appendChild(dirt);
  }

  const scrub = e=>{
    const rect = gameBox.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    const x = clientX - rect.left;
    const y = clientY - rect.top;

    const b = document.createElement("div");
    b.className = "bubble-dot";
    b.textContent = "🫧";
    b.style.left = (x-12) + "px";
    b.style.top = (y-12) + "px";
    gameStage.appendChild(b);
    timeout(()=>b.remove(),800);

    document.querySelectorAll(".scrub-dirt").forEach(d=>{
      const dx = d.offsetLeft + 21;
      const dy = d.offsetTop + 21;
      if(Math.hypot(dx-x,dy-y) < 50){
        d.remove();
        addScore(1);
      }
    });

    if(document.querySelectorAll(".scrub-dirt").length === 0){
      state.clean = 100;
      finishGame();
    }
  };

  gameBox.addEventListener("pointermove", scrub);
  gameBox.addEventListener("pointerdown", scrub);
  gameData.cleanup = ()=>{
    gameBox.removeEventListener("pointermove", scrub);
    gameBox.removeEventListener("pointerdown", scrub);
  };

  timeout(()=>{
    if(gameData.cleanup) gameData.cleanup();
    state.clean = clamp(state.clean + gameScore * 3);
    finishGame();
  },18000);
}

/* 5. SLEEP TAP */
function startSleepGame(){
  gameTitle.textContent = "💤 Sleep Tap";
  const petEl = addGamePet();
  petEl.style.bottom = "210px";

  const meter = document.createElement("div");
  meter.className = "sleep-meter";
  meter.innerHTML = `<div class="sleep-fill" id="sleepFill"></div>`;
  gameStage.appendChild(meter);

  gameData.sleep = 50;

  const tap = e=>{
    e.preventDefault();
    gameData.sleep = clamp(gameData.sleep + 10);
    addScore(1);

    const z = document.createElement("div");
    z.className = "sleep-z";
    z.textContent = "Z";
    z.style.left = (Math.random()*60 + 20) + "%";
    z.style.top = (Math.random()*35 + 25) + "%";
    gameStage.appendChild(z);
    timeout(()=>z.remove(),1000);
  };

  gameBox.addEventListener("pointerdown", tap);
  gameData.cleanup = ()=>gameBox.removeEventListener("pointerdown", tap);

  gameLoop = setInterval(()=>{
    gameData.sleep -= 4.5;
    $("sleepFill").style.width = clamp(gameData.sleep) + "%";

    if(gameData.sleep <= 0){
      if(gameData.cleanup) gameData.cleanup();
      state.energy = clamp(state.energy + gameScore);
      finishGame();
    }
  },250);

  timeout(()=>{
    if(gameData.cleanup) gameData.cleanup();
    state.energy = clamp(state.energy + Math.min(30,gameScore));
    finishGame();
  },17000);
}

/* 6. LUCKY WHEEL */
function startWheelGame(){
  gameTitle.textContent = "🎡 Lucky Wheel";
  gameScoreEl.textContent = "-";

  gameStage.innerHTML = `
    <div class="pointer">🔻</div>
    <div class="wheel-wrap">
      <div class="wheel" id="wheel">🐾</div>
    </div>
    <button class="wheel-btn btn-game" id="spinBtn">SPIN</button>
  `;

  $("spinBtn").onclick = ()=>{
    $("spinBtn").disabled = true;
    const prizes = [
      {text:"+15 coins", coins:15, xp:5},
      {text:"+30 coins", coins:30, xp:8},
      {text:"+10 XP", coins:0, xp:10},
      {text:"+Energy", coins:10, xp:5, energy:15},
      {text:"+Happy", coins:10, xp:5, happy:15},
      {text:"Jackpot +60", coins:60, xp:15}
    ];

    const index = Math.floor(Math.random()*prizes.length);
    const deg = 1440 + index * 60 + Math.floor(Math.random()*35);
    $("wheel").style.transform = `rotate(${deg}deg)`;

    timeout(()=>{
      const p = prizes[index];
      state.coins += p.coins || 0;
      state.energy = clamp(state.energy + (p.energy || 0));
      state.happy = clamp(state.happy + (p.happy || 0));
      addXP(p.xp || 0);
      showToast(p.text);
      say("Lucky!");
      updateUI();

      timeout(()=>{
        clearGame();
        gameModal.classList.remove("show");
        document.body.classList.remove("no-scroll");
        activeGame = null;
      },900);
    },3100);
  };
}

initPet();
updateUI();
say("Welcome!");
</script>
</body>
</html>
